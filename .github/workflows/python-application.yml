name: tarea3

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Contruir la imagen
      run: docker build -t ghcr.io/gma-galvez/proyecto:3.0.0 .

    - name: Login hacia Github Container Registry
      run: echo "${{ secrets.TOKEN_AV }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    
    - name: Push de la imagen a Github Container Registry
      run: docker push ghcr.io/gma-galvez/proyecto:3.0.0

    - name: Mostrar las variables o secrets
      run: |
        echo "Probando servidor ssh"
        echo "Host: ${{ secrets.VPS_HOST }}"
        echo "User: ${{ secrets.VPS_USER }}"
        echo "Port: ${{ secrets.VPS_SSH_PORT }}"
        echo "Password: ${{ secrets.VPS_PASSWORD }}"

    - name: Probar conexion ssh
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        port: ${{ secrets.VPS_SSH_PORT }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          echo "Conexión SSH exitosa"
          touch ejemplo.txt
          
    - name: Pasar archivos desde git al servidor
      uses: appleboy/scp-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        port: ${{ secrets.VPS_SSH_PORT }}
        password: ${{ secrets.VPS_PASSWORD }}
        source: "stack.yml,Makefile"
        target: "/home/${{ secrets.VPS_USER }}/landingb"
    
    - name: Desplegando servicios
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        port: ${{ secrets.VPS_SSH_PORT }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
         echo "Desplegando servicios"
         cd ~/landingb
         docker pull ghcr.io/gma-galvez/proyecto:3.0.0
         docker stack deploy -c stack.yml tarea3
         docker service update --force tarea3_geremy